<div
  class="drug-preview"
  [ngClass]="drug.nature ? 'preview-' + drug.nature : ''"
  (click)="toggle()"
  role="button"
  tabindex="0"
  (keyup.enter)="toggle()"
  (keyup.space)="toggle()"
  [class.expanded]="expanded"
>
  <div class="drug-name" [ngClass]="drug.nature ? 'nature-' + drug.nature : ''">
    {{ drug.name }}
  </div>

  <div class="drug-properties">
    <div class="prop-group prop-nature">
      @if (drug.nature) {
        <span class="badge nature-badge" [ngClass]="'nature-' + drug.nature">
          {{ natureLabels[drug.nature] }}
        </span>
      }
    </div>

    <div class="prop-group prop-flavors">
      @for (f of drug.flavors; track f) {
        <span class="flavor-wrap" [ngClass]="'flavor-wrap-' + f">
          <span class="badge flavor-badge" [ngClass]="'flavor-' + f">{{ flavorLabels[f] }}</span>
        </span>
      }
    </div>

    <div class="prop-group prop-tropism">
      @for (t of drug.tropism; track t) {
        <span class="badge" [ngClass]="'tropism-' + t" [title]="organLabels[t]">{{ organShortLabels[t] }}</span>
      }
    </div>
  </div>
</div>
