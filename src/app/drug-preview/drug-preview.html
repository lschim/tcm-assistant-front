<div
  class="drug-preview"
  (click)="toggle()"
  role="button"
  tabindex="0"
  (keyup.enter)="toggle()"
  (keyup.space)="toggle()"
  [class.expanded]="expanded"
>
  <div class="drug-name">
    {{ drug.name }}
  </div>

  <div class="drug-properties">
    <div class="prop-group prop-nature">
      @if (drug.nature) {
        <span class="badge" [ngClass]="'nature-' + drug.nature">
          {{ natureLabels[drug.nature] }}
        </span>
      }
    </div>

    <div class="prop-group prop-flavors">
      @for (f of drug.flavors; track f) {
        <span class="badge flavor-badge">{{ flavorLabels[f] }}</span>
      }
    </div>

    <div class="prop-group prop-tropism">
      @for (t of drug.tropism; track t) {
        <span class="badge" [ngClass]="'tropism-' + t" [title]="organLabels[t]">{{ organShortLabels[t] }}</span>
      }
    </div>
  </div>
</div>
