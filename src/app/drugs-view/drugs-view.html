<mat-accordion multi>
  @for (category of categories(); track category.id) {
    <mat-expansion-panel (opened)="onOpenCategory(category.id)">
      <mat-expansion-panel-header>
        <mat-panel-title>
          {{ category.name }}
        </mat-panel-title>
        <mat-panel-description> {{ category.description }} </mat-panel-description>
      </mat-expansion-panel-header>

      @if (drugService.getDrugsSignal(category.id)(); as drugs) {
        @for (drug of drugs; track drug.id) {
          <app-drug-preview
            [drug]="drug"
            [expanded]="selectedDrugId() === drug.id"
            (userClickPreview)="toggleDrug(drug.id)"
          >
          </app-drug-preview>
          @if (selectedDrugId() === drug.id) {
            <app-drug-view [drug]="drug"></app-drug-view>
          }
        }
      }
    </mat-expansion-panel>
  }
</mat-accordion>
